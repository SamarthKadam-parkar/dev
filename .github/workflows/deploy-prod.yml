name: Deploy to Prod Workspace
on:
  workflow_dispatch:

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
      - name: Deploy to Prod Workspace
        env:
          FABRIC_CLIENT_ID: ${{ secrets.CLIENT_ID }}
          FABRIC_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          FABRIC_TENANT_ID: ${{ secrets.TENANT_ID }}
          FABRIC_DEV_WORKSPACE: ${{ secrets.PROD_WORKSPACE_ID }}
        run: |
          python cicd/deploy_prod.py
 