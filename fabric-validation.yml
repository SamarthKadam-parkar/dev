name: Fabric Validation
on:
 pull_request:
   branches:
     - main
jobs:
 validate:
   runs-on: ubuntu-latest
   steps:
     - name: Checkout Repo
       uses: actions/checkout@v4
     - name: Setup Python
       uses: actions/setup-python@v5
       with:
         python-version: "3.11"
     - name: Install Dependencies
       run: |
         pip install -r requirements.txt
     - name: Run Validation
       run: |
         python scripts/validate.py